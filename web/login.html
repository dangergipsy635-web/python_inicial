<!DOCTYPE html>
<html>
    <head>
    <title>Formulario de registro</title>
    <meta charset="UTF-8"/>
    <link rel="stylesheet" href="comida.css"/>
  </head>
    <head>
        <title>Login</title>
        <meta charset="UTF-8"/>
        <!--bootstrap css-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <body>
        <div class="container">
            <!--nav-->
                <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Local De comida</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">comida</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">contacto</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">delivery</a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Ordenar</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
            <!--form-->
                <label for="exampleDataList" class="form-label">Detalles de su comida</label>
<input class="form-control" list="datalistOptions" id="exampleDataList" placeholder="Buscar...">
<datalist id="datalistOptions">
  <option value="Comida Clasica">
  <option value="Postres">
  <option value="Bebidas">
  <option value="Aperitivo">
  <option value="Asado">
</datalist>
        </div>

        <form>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Gmail de Usuario</label>
    <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
    <div id="emailHelp" class="form-text"Nunca compartiremos tu correo electrónico con nadie más.></div>
  </div>
  <div class="mb-3">
    <label for="exampleInputPassword1" class="form-label">Contraseña</label>
    <input type="password" class="form-control" id="exampleInputPassword1">
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" class="form-check-input" id="exampleCheck1">
    <label class="form-check-label" for="exampleCheck1">Recordame</label>
  </div>
  <button type="submit" class="btn btn-primary">Enviar</button>
</form>
    </body>
    <!--bootstrap js-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>"
</html>
